name: Build TIPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List all files
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== ALL FILES ==="
          find . -type f | head -30

      - name: Extract and find
        run: |
          # Giải nén tất cả zip
          for z in *.zip; do
            [ -f "$z" ] && echo "Extracting: $z" && unzip -o "$z" -d extracted/ && break
          done
          
          # Liệt kê extracted
          echo "=== EXTRACTED ==="
          ls -la extracted/ 2>/dev/null || echo "No extracted folder"
          find extracted/ -type f 2>/dev/null | head -20

      - name: Deep search for IPA
        run: |
          # Tìm IPA ở mọi nơi
          ipa=$(find . -name "*.ipa" 2>/dev/null | head -1)
          echo "IPA found: $ipa"
          
          # Nếu không có IPA, tìm APP
          if [ -z "$ipa" ]; then
            app=$(find . -name "*.app" -type d 2>/dev/null | head -1)
            echo "APP found: $app"
            
            if [ -n "$app" ]; then
              echo "Packaging APP to TIPA..."
              mkdir -p Payload
              cp -R "$app" Payload/
              zip -r app.tipa Payload
              ls -lh app.tipa
            else
              echo "ERROR: Nothing found!"
              exit 1
            fi
          else
            echo "Copying IPA to TIPA..."
            cp "$ipa" app.tipa
            ls -lh app.tipa
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tipa-file
          path: app.tipa
          if-no-files-found: error
