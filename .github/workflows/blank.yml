name: Build .tipa

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check files
        run: |
          echo "=== Files in repo ==="
          ls -la
          echo "=== Looking for zip ==="
          ls *.zip 2>/dev/null || echo "No zip found"
          echo "=== Looking for xcodeproj ==="
          find . -name "*.xcodeproj" 2>/dev/null || echo "No xcodeproj found"
          echo "=== Looking for Makefile ==="
          find . -name "Makefile" 2>/dev/null || echo "No Makefile found"

      - name: Unzip source
        run: |
          for zip in *.zip; do
            if [ -f "$zip" ]; then
              echo "Unzipping: $zip"
              unzip -o "$zip"
              break
            fi
          done

      - name: Check after unzip
        run: |
          echo "=== Files after unzip ==="
          ls -la
          find . -name "*.xcodeproj" -o -name "Makefile" | head -5

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build with Xcode
        run: |
          proj=$(find . -name "*.xcodeproj" | head -1)
          if [ -n "$proj" ]; then
            echo "Found project: $proj"
            dir=$(dirname "$proj")
            base=$(basename "$proj")
            cd "$dir"
            xcodebuild -project "$base" \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ONLY_ACTIVE_ARCH=NO \
              ARCHS=arm64
          else
            echo "No Xcode project found!"
            exit 1
          fi

      - name: Package to .tipa
        run: |
          rm -rf Payload
          mkdir Payload
          app_path=$(find . -name "*.app" -type d | grep -v "Payload" | head -1)
          if [ -n "$app_path" ]; then
            cp -R "$app_path" Payload/
            zip -r app.tipa Payload
          else
            echo "No .app found!"
            exit 1
          fi

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: app-tipa
          path: app.tipa
          retention-days: 30
