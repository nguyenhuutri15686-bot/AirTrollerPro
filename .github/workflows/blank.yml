name: Build .tipa

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List all files
        run: |
          echo "=== ROOT FILES ==="
          ls -la
          echo "=== ALL FILES ==="
          find . -type f | head -30

      - name: Extract ZIP
        run: |
          for zip in *.zip; do
            if [ -f "$zip" ]; then
              echo "Found ZIP: $zip"
              unzip -o "$zip" -d extracted/
              echo "=== EXTRACTED ==="
              ls -la extracted/
              find extracted/ -type f | head -20
              break
            fi
          done

      - name: Find IPA or APP
        run: |
          # Tìm trong extracted trước
          ipa=$(find extracted/ -name "*.ipa" 2>/dev/null | head -1)
          app=$(find extracted/ -name "*.app" -type d 2>/dev/null | head -1)
          
          # Nếu không có, tìm ở root
          if [ -z "$ipa" ]; then
            ipa=$(find . -maxdepth 1 -name "*.ipa" | head -1)
          fi
          if [ -z "$app" ]; then
            app=$(find . -maxdepth 2 -name "*.app" -type d | head -1)
          fi
          
          echo "IPA found: $ipa"
          echo "APP found: $app"
          
          if [ -n "$ipa" ]; then
            echo "Copying IPA to app.tipa"
            cp "$ipa" ./app.tipa
            ls -lh app.tipa
          elif [ -n "$app" ]; then
            echo "Packaging APP to TIPA"
            mkdir -p Payload
            cp -R "$app" Payload/
            zip -r app.tipa Payload
            ls -lh app.tipa
          else
            echo "ERROR: Nothing found to convert!"
            exit 1
          fi

      - name: Upload TIPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-tipa
          path: app.tipa
          if-no-files-found: error
