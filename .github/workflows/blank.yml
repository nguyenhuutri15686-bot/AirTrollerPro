name: Build .tipa

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and process files
        run: |
          echo "=== All files ==="
          ls -la
          find . -maxdepth 2 -type f | head -20

      - name: Unzip if needed
        run: |
          for zip in *.zip; do
            [ -f "$zip" ] && echo "Unzipping $zip" && unzip -o "$zip" && break
          done
          echo "=== After unzip ==="
          ls -la

      - name: Create TIPA
        run: |
          # Nếu có .ipa sẵn → đổi tên
          ipa=$(find . -name "*.ipa" | head -1)
          if [ -n "$ipa" ]; then
            echo "Found IPA: $ipa"
            cp "$ipa" ./app.tipa
            echo "Created app.tipa"
            ls -lh app.tipa
            exit 0
          fi
          
          # Nếu có .app → đóng gói
          app=$(find . -name "*.app" -type d | head -1)
          if [ -n "$app" ]; then
            echo "Found APP: $app"
            mkdir -p Payload
            cp -R "$app" Payload/
            zip -r app.tipa Payload
            ls -lh app.tipa
            exit 0
          fi
          
          echo "No IPA or APP found!"
          exit 1

      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: app-tipa
          path: app.tipa
          if-no-files-found: error
