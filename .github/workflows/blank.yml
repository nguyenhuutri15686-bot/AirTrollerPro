name: Build .tipa

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip source if needed
        run: |
          # Tìm và giải nén zip nếu có
          for zip in *.zip; do
            [ -f "$zip" ] && unzip -o "$zip" && break
          done

      - name: Find Xcode project
        run: |
          # Tìm file .xcodeproj
          proj=$(find . -name "*.xcodeproj" -maxdepth 2 | head -1)
          echo "PROJECT=$proj" >> $GITHUB_ENV
          echo "Found: $proj"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build IPA (No Code Sign)
        run: |
          cd "$(dirname "$PROJECT")" || cd .
          xcodebuild -project "$(basename "$PROJECT")" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64

      - name: Package to .tipa
        run: |
          rm -rf Payload
          mkdir Payload
          app_path=$(find build -name "*.app" -type d | head -1)
          cp -R "$app_path" Payload/
          zip -r app.tipa Payload

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: app-tipa
          path: app.tipa
          retention-days: 30
